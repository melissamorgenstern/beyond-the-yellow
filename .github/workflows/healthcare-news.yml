name: Weekly Healthcare Intelligence

# Builds the Beyond the Yellow healthcare report from public news feeds and
# posts it to Slack every Monday at 9am Eastern. Runs entirely on GitHub —
# no laptop required, and no API keys or tokens needed. The only secret used
# is SLACK_WEBHOOK_URL.

on:
  # GitHub cron is UTC and does NOT adjust for daylight saving, so we fire at
  # both candidate hours and the guard step keeps only the 9am-Eastern run.
  schedule:
    - cron: '0 13 * * 1'   # 09:00 America/New_York during EDT (summer)
    - cron: '0 14 * * 1'   # 09:00 America/New_York during EST (winter)
  workflow_dispatch: {}     # lets you run it manually from the Actions tab

permissions:
  contents: write           # allow the job to commit the regenerated page

concurrency:
  group: healthcare-news
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Only continue at 9am Eastern
        id: guard
        run: |
          HOUR="$(TZ=America/New_York date +%H)"
          if [ "${{ github.event_name }}" = "schedule" ] && [ "$HOUR" != "09" ]; then
            echo "It's ${HOUR}:00 Eastern, not 09:00 — skipping this run."
            echo "run=false" >> "$GITHUB_OUTPUT"
          else
            echo "run=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout repo
        if: steps.guard.outputs.run == 'true'
        uses: actions/checkout@v4

      - name: Set up Python
        if: steps.guard.outputs.run == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build the report from news feeds
        if: steps.guard.outputs.run == 'true'
        run: |
          python3 - <<'PY'
          #!/usr/bin/env python3
          """Beyond the Yellow — weekly healthcare report builder (feed-based).

          No AI, no API keys. Pulls public healthcare-news RSS feeds, keeps the last
          7 days, sorts stories into the Beyond the Yellow themed sections (plus an
          expanded set of coverage sections so nothing important slips through), flags
          under-tracked topics ("What You're Not Tracking"), lists prior reports, and
          writes index.html + a dated archive + top3.txt.

          Layout: a left-hand navigation sidebar links to every section. Each story
          card shows "The takeaway" — a light why-it-matters line lifted from the
          article's own summary (NOT invented Zocdoc analysis).

          Uses only the Python standard library. Run with --selftest to render from
          built-in sample stories without touching the network.
          """

          import glob
          import html
          import re
          import sys
          import urllib.request
          from datetime import datetime, timedelta, timezone
          from email.utils import parsedate_to_datetime
          from xml.etree import ElementTree as ET

          # (display name, feed url)
          FEEDS = [
              ("Fierce Healthcare", "https://www.fiercehealthcare.com/rss/xml"),
              ("STAT News", "https://www.statnews.com/feed/"),
              ("MedCity News", "https://medcitynews.com/feed/"),
              ("Healthcare Dive", "https://www.healthcaredive.com/feeds/news/"),
              ("MobiHealthNews", "https://www.mobihealthnews.com/feed"),
              ("Healthcare IT News", "https://www.healthcareitnews.com/home/feed"),
              ("Healthcare Finance News", "https://www.healthcarefinancenews.com/home/feed"),
              ("Behavioral Health Business", "https://bhbusiness.com/feed/"),
          ]

          # Themed sections. A story lands in the FIRST theme it matches. The first six
          # are the original Beyond the Yellow themes; the rest broaden coverage so the
          # report stays comprehensive across the industry. Each has a static,
          # descriptive intro (no invented statistics). (name, intro, keywords)
          THEMES = [
              ("AI as Healthcare Interface",
               "AI agents, health search, care navigation, and clinical workflow.",
               ["artificial intelligence", " ai ", "ai-", "ai,", "ai.", "chatgpt", "copilot",
                "openai", "anthropic", "perplexity", "machine learning", "llm", "chatbot",
                "agentforce", "care navigation", "clinical workflow", "automation", "algorithm"]),
              ("Distribution, Partnerships & Front-Door Control",
               "Platform partnerships, marketplaces, and who owns the patient's first click.",
               ["partnership", "partners with", "collaborat", "integration", "channel",
                "front door", "front-door", "mychart", "showroom", "marketplace", "distribution",
                "retail", "one medical", "joins forces", "teams up", "strategic"]),
              ("Pricing, Payment & Affordability",
               "Costs, coverage, GLP-1s, price transparency, and shoppable care.",
               ["price", "pricing", "payment", "affordab", "cost", "glp-1", "glp1", "copay",
                "reimburse", "bundled payment", "transparency", "cash pricing", "out-of-pocket",
                "premium", "deductible", "value-based"]),
              ("Regulatory, Policy & Interoperability",
               "CMS, HHS, FDA, data standards, prior auth, and information blocking.",
               ["cms", "hhs", "fda", "ftc", "regulation", "policy", "congress", "senate",
                "house", "legislation", " bill ", "hipaa", "tefca", "fhir", "interoperab",
                "prior auth", "information blocking", "rule", "federal", "medicare", "medicaid"]),
              ("Consumer Health, Labs & Wearables",
               "Wearables, at-home testing, and direct-to-consumer health.",
               ["wearable", "oura", "whoop", "fitbit", "apple watch", "garmin", "samsung health",
                "lab test", "dtc", "direct-to-consumer", "consumer health", "at-home test",
                "biometric", "dexa", "blood test"]),
              ("Competitive Ecosystem & M&A/Funding",
               "Deals, funding rounds, mergers, and competitive moves.",
               ["raises", "raised", "funding", "series a", "series b", "series c", "series d",
                "acquisition", "acquires", "acquire", "merger", "m&a", "valuation", "ipo",
                "venture", "funding round", "invests", "billion", "million", "startup"]),
              # --- Broader coverage so the report doesn't miss whole categories ---
              ("Care Delivery & New Models",
               "Value-based care, home-based care, primary care, and telehealth models.",
               ["value-based care", "aco", "accountable care", "hospital-at-home", "hospital at home",
                "home-based", "home health", "primary care", "telehealth", "telemedicine",
                "virtual care", "virtual-first", "care model", "risk-bearing", "capitation",
                "advanced primary care"]),
              ("Behavioral & Mental Health",
               "Mental health, psychiatry, substance use, and digital therapeutics.",
               ["behavioral health", "mental health", "psychiatry", "psychiatric", "substance use",
                "addiction", "depression", "anxiety", "therapy", "digital therapeutic", "ketamine"]),
              ("Provider Operations & Revenue Cycle",
               "Staffing, EHR/admin burden, billing, claims, and throughput.",
               ["revenue cycle", "rcm", "medical billing", "claims denial", "denials", "staffing",
                "ehr", "electronic health record", "administrative burden", "scheduling", "throughput",
                "labor cost", "nurse staffing", "documentation burden"]),
              ("Employers, Benefits & PBMs",
               "Self-insured employers, benefits navigation, and pharmacy benefit managers.",
               ["employer", "self-insured", "self insured", "benefits", "pbm", "pharmacy benefit",
                "navigation vendor", "tpa", "third-party administrator", "broker", "plan sponsor"]),
              ("Data, Privacy & Cybersecurity",
               "Breaches, ransomware, data security, and HIPAA enforcement.",
               ["cyberattack", "cyber attack", "ransomware", "data breach", "breach", "data security",
                "cybersecurity", "hipaa violation", "privacy", "hacked", "hack ", "phishing",
                "leak", "exposed records"]),
              ("Clinical Evidence & Outcomes",
               "Studies, trials, quality, safety, and real-world evidence.",
               ["clinical trial", "study finds", " study ", "research", "outcomes", "efficacy",
                "peer-reviewed", "jama", "nejm", "real-world evidence", "mortality", "readmission",
                "quality measure", "patient safety"]),
          ]
          FALLBACK_THEME = ("Other Industry News",
                            "Notable healthcare stories from this week's feeds.", [])

          # Topics Beyond the Yellow tends to UNDER-track — surfaced separately with a
          # badge so they don't get lost. These intentionally do NOT overlap with the
          # sections above. (label, [keywords])
          GAP_TOPICS = [
              ("Health Equity", ["health equity", "sdoh", "social determinants", "underserved",
                                 "disparities", "access to care", "uninsured"]),
              ("Patient Trust & Brand", ["patient trust", "patient experience", "reputation",
                                         "online reviews", "patient satisfaction", "consumer trust"]),
              ("Workforce & Burnout", ["burnout", "workforce shortage", "nurse shortage",
                                       "clinician shortage", "physician shortage", "great resignation"]),
              ("Rural Health", ["rural health", "rural hospital", "rural care", "critical access"]),
              ("Women's & Maternal Health", ["maternal", "women's health", "womens health", "fertility",
                                              "menopause", "obstetric", "maternity"]),
              ("Aging & Senior Care", ["senior care", "aging", "older adults", "long-term care",
                                       "nursing home", "geriatric", "elder care"]),
              ("Global & Public Health", ["public health", "global health", "who ", "world health",
                                          "pandemic", "outbreak", "cdc"]),
          ]

          WINDOW_DAYS = 7
          MAX_PER_THEME = 8
          MAX_GAP_ITEMS = 6
          HTTP_TIMEOUT = 25
          UA = "BeyondTheYellow-NewsBot/1.0 (+https://github.com/melissamorgenstern/beyond-the-yellow)"


          def clean(text):
              text = re.sub(r"<[^>]+>", " ", text or "")
              text = html.unescape(text)
              return re.sub(r"\s+", " ", text).strip()


          def parse_date(value):
              if not value:
                  return None
              value = value.strip()
              try:
                  dt = parsedate_to_datetime(value)
                  if dt is not None:
                      return dt if dt.tzinfo else dt.replace(tzinfo=timezone.utc)
              except (TypeError, ValueError):
                  pass
              try:
                  dt = datetime.fromisoformat(value.replace("Z", "+00:00"))
                  return dt if dt.tzinfo else dt.replace(tzinfo=timezone.utc)
              except ValueError:
                  return None


          def _text(el):
              return el.text if el is not None and el.text else ""


          def parse_feed(xml_bytes, source):
              stories = []
              root = ET.fromstring(xml_bytes)
              items = root.findall(".//item")
              if items:
                  for it in items:
                      stories.append({
                          "source": source,
                          "title": clean(_text(it.find("title"))),
                          "link": _text(it.find("link")).strip(),
                          "summary": clean(_text(it.find("description"))),
                          "date": parse_date(_text(it.find("pubDate"))),
                      })
                  return stories
              ns = {"a": "http://www.w3.org/2005/Atom"}
              entries = root.findall(".//a:entry", ns) or root.findall(".//{*}entry")
              for en in entries:
                  link_el = en.find("a:link", ns) or en.find("{*}link")
                  link = link_el.get("href") if link_el is not None else ""
                  summary_el = (en.find("a:summary", ns) or en.find("a:content", ns)
                                or en.find("{*}summary") or en.find("{*}content"))
                  date_raw = (_text(en.find("a:published", ns)) or _text(en.find("a:updated", ns))
                              or _text(en.find("{*}published")) or _text(en.find("{*}updated")))
                  title_el = en.find("a:title", ns) or en.find("{*}title")
                  stories.append({
                      "source": source,
                      "title": clean(_text(title_el)),
                      "link": (link or "").strip(),
                      "summary": clean(_text(summary_el)),
                      "date": parse_date(date_raw),
                  })
              return stories


          def fetch(url):
              req = urllib.request.Request(url, headers={"User-Agent": UA})
              with urllib.request.urlopen(req, timeout=HTTP_TIMEOUT) as resp:
                  return resp.read()


          def collect_stories():
              cutoff = datetime.now(timezone.utc) - timedelta(days=WINDOW_DAYS)
              seen, stories = set(), []
              for source, url in FEEDS:
                  try:
                      parsed = parse_feed(fetch(url), source)
                  except Exception as exc:
                      print(f"  ! skipped {source}: {exc}", file=sys.stderr)
                      continue
                  kept = 0
                  for s in parsed:
                      if not s["title"] or not s["link"]:
                          continue
                      if s["date"] is not None and s["date"] < cutoff:
                          continue
                      key = s["link"].split("?")[0].lower()
                      if key in seen:
                          continue
                      seen.add(key)
                      stories.append(s)
                      kept += 1
                  print(f"  + {source}: {kept} stories", file=sys.stderr)
              return stories


          def match(story, keywords):
              blob = (story["title"] + " " + story["summary"]).lower()
              return any(kw in blob for kw in keywords)


          def gap_label(story):
              for label, kws in GAP_TOPICS:
                  if match(story, kws):
                      return label
              return None


          def theme_for(story):
              for name, _intro, kws in THEMES:
                  if match(story, kws):
                      return name
              return FALLBACK_THEME[0]


          def score(story):
              blob = (story["title"] + " " + story["summary"]).lower()
              hits = sum(blob.count(kw) for _n, _i, kws in THEMES for kw in kws)
              recency = 0
              if story["date"] is not None:
                  recency = max(0, WINDOW_DAYS - (datetime.now(timezone.utc) - story["date"]).days)
              return hits * 5 + recency


          def trim(text, limit=320):
              if not text:
                  return ""
              return (text[: limit - 1].rsplit(" ", 1)[0] + "…") if len(text) > limit else text


          def split_takeaway(summary):
              """Split a summary into (lead sentence, remainder). The lead becomes
              'The takeaway'; the remainder fills the regular summary line. This keeps
              the takeaway honest — it's the article's own point, not invented."""
              summary = (summary or "").strip()
              if not summary:
                  return "", ""
              m = re.search(r"(?<=[.!?])\s+", summary)
              if m:
                  return summary[:m.start()].strip(), summary[m.end():].strip()
              return summary, ""


          def meta_line(s):
              d = s["date"].strftime("%B %d, %Y") if s["date"] else "Recent"
              return f"{s['source']} · {d}"


          def slug(text):
              return re.sub(r"-+", "-", re.sub(r"[^a-z0-9]+", "-", text.lower())).strip("-")


          CSS = """
                  * { margin: 0; padding: 0; box-sizing: border-box; }
                  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
                      background: #fafafa; color: #1a1a1a; line-height: 1.6; padding: 2rem; }
                  header { border-bottom: 4px solid #f5c518; padding-bottom: 1.5rem; margin-bottom: 2rem;
                      max-width: 1140px; margin-left: auto; margin-right: auto; }
                  header h1 { font-size: 2rem; color: #1a1a1a; letter-spacing: -0.5px; }
                  header h1 span { color: #f5c518; }
                  .date { color: #666; font-size: 0.95rem; margin-top: 0.25rem; }
                  .layout { display: flex; gap: 2.5rem; max-width: 1140px; margin: 0 auto;
                      align-items: flex-start; }
                  nav.sidebar { width: 220px; flex-shrink: 0; position: sticky; top: 1.5rem;
                      align-self: flex-start; font-size: 0.9rem; }
                  nav.sidebar .nav-title { text-transform: uppercase; letter-spacing: 1px;
                      font-size: 0.7rem; color: #999; margin-bottom: 0.75rem; font-weight: 600; }
                  nav.sidebar ul { list-style: none; padding: 0; border-left: 2px solid #eee; }
                  nav.sidebar li a { display: block; padding: 0.3rem 0 0.3rem 0.85rem; margin-left: -2px;
                      color: #555; text-decoration: none; border-left: 2px solid transparent; }
                  nav.sidebar li a:hover { color: #b8860b; border-left-color: #f5c518; }
                  main { flex: 1; min-width: 0; max-width: 760px; }
                  .note { background: #f7f7f7; border: 1px solid #eee; border-radius: 8px;
                      padding: 0.75rem 1rem; font-size: 0.85rem; color: #777; margin-bottom: 2rem; }
                  .top-watch { background: linear-gradient(135deg, #fffef5, #fff9db);
                      border: 2px solid #f5c518; border-radius: 12px; padding: 1.5rem; margin-bottom: 2.5rem;
                      scroll-margin-top: 1.5rem; }
                  .top-watch h2 { font-size: 1.3rem; margin-bottom: 1rem; color: #b8860b; }
                  .watch-item { padding: 0.75rem 0; border-bottom: 1px solid #f0e6b8; }
                  .watch-item:last-child { border-bottom: none; }
                  .watch-item h3 { font-size: 1rem; margin-bottom: 0.25rem; }
                  .watch-item h3 a { color: #1a1a1a; text-decoration: none; }
                  .watch-item h3 a:hover { color: #b8860b; }
                  .watch-item p { font-size: 0.9rem; color: #444; }
                  section { margin-bottom: 2.5rem; scroll-margin-top: 1.5rem; }
                  section h2 { font-size: 1.4rem; border-left: 4px solid #f5c518;
                      padding-left: 0.75rem; margin-bottom: 1.25rem; }
                  .section-context { font-size: 0.9rem; color: #666; font-style: italic;
                      margin-top: -0.75rem; margin-bottom: 1.25rem; padding-left: 0.75rem; }
                  .story { background: #fff; border: 1px solid #e5e5e5; border-radius: 8px;
                      padding: 1.25rem; margin-bottom: 1rem; transition: box-shadow 0.2s; }
                  .story:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
                  .story h3 { font-size: 1.05rem; margin-bottom: 0.5rem; }
                  .story h3 a { color: #1a1a1a; text-decoration: none; }
                  .story h3 a:hover { color: #b8860b; }
                  .story .meta { font-size: 0.8rem; color: #888; margin-bottom: 0.5rem; }
                  .story .summary { font-size: 0.95rem; color: #333; margin-bottom: 0.5rem; }
                  .story .takeaway { font-size: 0.85rem; color: #b8860b; font-style: italic;
                      background: #fffef5; border-radius: 4px; padding: 0.45rem 0.65rem; margin-top: 0.4rem; }
                  .story .takeaway b { font-style: normal; color: #8a6d0b; }
                  .gap-badge { display: inline-block; background: #e8f4fd; color: #1a73e8;
                      font-size: 0.7rem; font-weight: 600; padding: 0.15rem 0.5rem; border-radius: 4px;
                      margin-left: 0.5rem; vertical-align: middle; text-transform: uppercase;
                      letter-spacing: 0.5px; }
                  .archive { margin-bottom: 2rem; }
                  .archive ul { list-style: none; padding: 0; }
                  .archive li { padding: 0.5rem 0; border-bottom: 1px solid #eee; }
                  .archive li a { color: #1a1a1a; text-decoration: none; font-size: 0.95rem; }
                  .archive li a:hover { color: #b8860b; }
                  footer { text-align: center; color: #999; font-size: 0.8rem;
                      padding-top: 2rem; border-top: 1px solid #eee; max-width: 1140px;
                      margin: 0 auto; }
                  @media (max-width: 760px) {
                      body { padding: 1rem; }
                      .layout { flex-direction: column; gap: 1.5rem; }
                      nav.sidebar { position: static; width: auto; border-bottom: 1px solid #eee;
                          padding-bottom: 1rem; }
                      nav.sidebar ul { display: flex; flex-wrap: wrap; gap: 0.25rem 1rem; border-left: none; }
                      nav.sidebar li a { border-left: none; padding-left: 0; }
                      main { max-width: none; }
                  }
          """.rstrip("\n")


          def esc(t):
              return html.escape(t or "")


          def story_card(s, badge=None):
              badge_html = f' <span class="gap-badge">{esc(badge)}</span>' if badge else ""
              takeaway, remainder = split_takeaway(s["summary"])
              parts = [
                  '        <div class="story">',
                  f'            <h3><a href="{esc(s["link"])}" target="_blank">{esc(s["title"])}</a>{badge_html}</h3>',
                  f'            <div class="meta">{esc(meta_line(s))}</div>',
              ]
              if remainder:
                  parts.append(f'            <div class="summary">{esc(trim(remainder))}</div>')
              if takeaway:
                  parts.append(f'            <div class="takeaway"><b>The takeaway:</b> {esc(trim(takeaway, 240))}</div>')
              parts.append('        </div>')
              return "\n".join(parts)


          def find_archives():
              items = []
              for path in glob.glob("healthcare-news-*.html"):
                  m = re.search(r"(\d{4}-\d{2}-\d{2})", path)
                  if not m:
                      continue
                  try:
                      label = datetime.strptime(m.group(1), "%Y-%m-%d").strftime("%B %d, %Y")
                  except ValueError:
                      label = m.group(1)
                  items.append((m.group(1), path, label))
              items.sort(reverse=True)
              return items


          def build_nav(nav_items):
              p = ['    <nav class="sidebar">', '        <div class="nav-title">On this page</div>', "        <ul>"]
              for anchor, label in nav_items:
                  p.append(f'            <li><a href="#{anchor}">{esc(label)}</a></li>')
              p.append("        </ul>")
              p.append("    </nav>")
              return "\n".join(p)


          def build_html(top3, sections, gaps, archives, week_of, generated_at):
              # Work out the nav links (only sections that will actually render).
              nav_items = []
              if top3:
                  nav_items.append(("top3", "Top 3 to Watch"))
              for name, _intro, items in sections:
                  if items:
                      nav_items.append((slug(name), name))
              nav_items.append(("not-tracking", "What You're Not Tracking"))
              if archives:
                  nav_items.append(("previous-reports", "Previous Reports"))

              p = [
                  "<!DOCTYPE html>", '<html lang="en">', "<head>", '    <meta charset="UTF-8">',
                  '    <meta name="viewport" content="width=device-width, initial-scale=1.0">',
                  "    <title>Beyond the Yellow — Healthcare Intelligence</title>",
                  f"    <style>{CSS}\n    </style>", "</head>", "<body>",
                  "    <header>",
                  "        <h1>Beyond the <span>Yellow</span> — Healthcare Intelligence</h1>",
                  f'        <div class="date">Week of {esc(week_of)} · automated feed edition</div>',
                  "    </header>",
                  '    <div class="layout">',
                  build_nav(nav_items),
                  "    <main>",
                  '    <div class="note">Auto-generated from public healthcare news feeds. '
                  '"The takeaway" lines are drawn from each article\'s own summary; this edition '
                  "does not include hand-written Zocdoc strategic analysis.</div>",
              ]

              if top3:
                  p.append('    <div class="top-watch" id="top3">')
                  p.append("        <h2>Top 3 Things to Watch</h2>")
                  for i, s in enumerate(top3, 1):
                      p.append('        <div class="watch-item">')
                      p.append(f'            <h3>{i}. <a href="{esc(s["link"])}" target="_blank">{esc(s["title"])}</a></h3>')
                      lead, _rest = split_takeaway(s["summary"])
                      if lead:
                          p.append(f'            <p>{esc(trim(lead, 280))}</p>')
                      p.append("        </div>")
                  p.append("    </div>")

              for name, intro, items in sections:
                  if not items:
                      continue
                  p.append(f'    <section id="{slug(name)}">')
                  p.append(f"        <h2>{esc(name)}</h2>")
                  p.append(f'        <div class="section-context">{esc(intro)}</div>')
                  for s in items:
                      p.append(story_card(s))
                  p.append("    </section>")

              p.append('    <section id="not-tracking">')
              p.append("        <h2>What You're Not Tracking</h2>")
              p.append('        <div class="section-context">Under-tracked themes that surfaced in the feeds this week.</div>')
              if gaps:
                  for s in gaps:
                      p.append(story_card(s, badge=s["_gap"]))
              else:
                  p.append('        <div class="note">Quiet in the feeds this week — no notable coverage of the usual under-tracked themes.</div>')
              p.append("    </section>")

              if archives:
                  p.append('    <section class="archive" id="previous-reports">')
                  p.append("        <h2>Previous Reports</h2>")
                  p.append("        <ul>")
                  for _key, path, label in archives:
                      p.append(f'            <li><a href="{esc(path)}">{esc(label)}</a></li>')
                  p.append("        </ul>")
                  p.append("    </section>")

              p.append("    </main>")
              p.append("    </div>")
              p.append("    <footer>")
              p.append(f"        Generated {esc(generated_at)} · Auto-built from public healthcare news feeds · Beyond the Yellow")
              p.append("    </footer>")
              p.append("</body>")
              p.append("</html>")
              return "\n".join(p) + "\n"


          def build(stories):
              now = datetime.now(timezone.utc)
              week_of = now.strftime("%B %d, %Y")
              generated_at = now.strftime("%B %d, %Y %H:%M UTC")

              # Gap items first (and removed from the themed pool), then theme buckets.
              gaps, rest = [], []
              for s in stories:
                  label = gap_label(s)
                  if label and len(gaps) < MAX_GAP_ITEMS * 3:
                      s = dict(s, _gap=label)
                      gaps.append(s)
                  else:
                      rest.append(s)
              gaps.sort(key=score, reverse=True)
              gaps = gaps[:MAX_GAP_ITEMS]

              buckets = {name: [] for name, _i, _k in THEMES}
              buckets[FALLBACK_THEME[0]] = []
              for s in rest:
                  buckets[theme_for(s)].append(s)
              for name in buckets:
                  buckets[name].sort(key=lambda s: (s["date"] or now), reverse=True)
                  buckets[name] = buckets[name][:MAX_PER_THEME]

              ordered = [(n, i, buckets[n]) for n, i, _k in THEMES]
              ordered.append((FALLBACK_THEME[0], FALLBACK_THEME[1], buckets[FALLBACK_THEME[0]]))

              top3 = sorted(stories, key=score, reverse=True)[:3]
              archives = find_archives()

              doc = build_html(top3, ordered, gaps, archives, week_of, generated_at)
              with open("index.html", "w", encoding="utf-8") as f:
                  f.write(doc)
              archive_name = f"healthcare-news-{now.strftime('%Y-%m-%d')}.html"
              with open(archive_name, "w", encoding="utf-8") as f:
                  f.write(doc)

              with open("top3.txt", "w", encoding="utf-8") as f:
                  if top3:
                      for i, s in enumerate(top3, 1):
                          f.write(f"{i}. {s['title']} ({s['source']})\n")
                  else:
                      f.write("Your weekly healthcare intelligence roundup is ready.\n")

              total = sum(len(items) for _n, _i, items in ordered) + len(gaps)
              print(f"Wrote index.html, {archive_name}, top3.txt — {total} stories.", file=sys.stderr)
              return total


          SAMPLE = [

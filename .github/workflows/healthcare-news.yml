name: Weekly Healthcare Intelligence

# Builds the Beyond the Yellow healthcare report from public news feeds and
# posts it to Slack every Monday at 9am Eastern. Runs entirely on GitHub —
# no laptop required, and no API keys or tokens needed. The only secret used
# is SLACK_WEBHOOK_URL.

on:
  # GitHub cron is UTC and does NOT adjust for daylight saving, so we fire at
  # both candidate hours and the guard step keeps only the 9am-Eastern run.
  schedule:
    - cron: '0 13 * * 1'   # 09:00 America/New_York during EDT (summer)
    - cron: '0 14 * * 1'   # 09:00 America/New_York during EST (winter)
  workflow_dispatch: {}     # lets you run it manually from the Actions tab

permissions:
  contents: write           # allow the job to commit the regenerated page

concurrency:
  group: healthcare-news
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Only continue at 9am Eastern
        id: guard
        run: |
          HOUR="$(TZ=America/New_York date +%H)"
          if [ "${{ github.event_name }}" = "schedule" ] && [ "$HOUR" != "09" ]; then
            echo "It's ${HOUR}:00 Eastern, not 09:00 — skipping this run."
            echo "run=false" >> "$GITHUB_OUTPUT"
          else
            echo "run=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout repo
        if: steps.guard.outputs.run == 'true'
        uses: actions/checkout@v4

      - name: Set up Python
        if: steps.guard.outputs.run == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build the report from news feeds
        if: steps.guard.outputs.run == 'true'
        run: |
          python3 - <<'PY'
          #!/usr/bin/env python3
          """Beyond the Yellow — weekly healthcare report builder.

          No AI, no API keys. Pulls public healthcare-news RSS feeds, keeps the last
          7 days, groups stories by topic, picks a Top 3, and writes:
            - index.html                     (the published page)
            - healthcare-news-YYYY-MM-DD.html (dated archive)
            - top3.txt                       (plain text the Slack step posts)

          Uses only the Python standard library so the GitHub Action has nothing to
          install. Run `python3 scripts/build_report.py --selftest` to render a page
          from built-in sample stories without touching the network.
          """

          import html
          import re
          import sys
          import urllib.request
          from datetime import datetime, timedelta, timezone
          from email.utils import parsedate_to_datetime
          from xml.etree import ElementTree as ET

          # (display name, feed url)
          FEEDS = [
              ("Fierce Healthcare", "https://www.fiercehealthcare.com/rss/xml"),
              ("STAT News", "https://www.statnews.com/feed/"),
              ("MedCity News", "https://medcitynews.com/feed/"),
              ("Healthcare Dive", "https://www.healthcaredive.com/feeds/news/"),
              ("MobiHealthNews", "https://www.mobihealthnews.com/feed"),
              ("Healthcare IT News", "https://www.healthcareitnews.com/home/feed"),
              ("Healthcare Finance News", "https://www.healthcarefinancenews.com/home/feed"),
          ]

          # Stories fall into the FIRST category whose keywords they match.
          CATEGORIES = [
              ("Competitor moves", [
                  "sesame", "hims", "hers", "talkiatry", "headway", "alma", "cerebral",
                  "teladoc", "amwell", "carbon health", "one medical", "amazon health",
                  "zocdoc", "doximity", "gohealth", "spruce", "included health",
              ]),
              ("Regulatory & policy", [
                  "cms", "medicare", "medicaid", "hhs", "ftc", "fda", "telehealth policy",
                  "price transparency", "prior auth", "regulation", "policy", "congress",
                  "lawsuit", "federal", "white house", "senate",
              ]),
              ("AI & industry trends", [
                  "artificial intelligence", "machine learning", "digital health",
                  "patient acquisition", "marketplace", "virtual care", "startup",
                  "funding", "venture", "raises", " ai ", "ai-", "chatbot", "automation",
              ]),
              ("Health systems", [
                  "merger", "acquisition", "ehr", "epic", "oracle health", "cerner",
                  "interoperability", "payer", "provider", "hospital", "layoff",
                  "workforce", "health system", "nurses", "physicians",
              ]),
          ]
          FALLBACK_CATEGORY = "More headlines"

          WINDOW_DAYS = 7
          MAX_PER_CATEGORY = 8
          HTTP_TIMEOUT = 25
          UA = "BeyondTheYellow-NewsBot/1.0 (+https://github.com/melissamorgenstern/beyond-the-yellow)"


          def clean(text):
              text = re.sub(r"<[^>]+>", " ", text or "")
              text = html.unescape(text)
              return re.sub(r"\s+", " ", text).strip()


          def parse_date(value):
              if not value:
                  return None
              value = value.strip()
              # RSS 2.0 / RFC-822: "Mon, 15 Jun 2026 14:30:00 +0000"
              try:
                  dt = parsedate_to_datetime(value)
                  if dt is not None:
                      return dt if dt.tzinfo else dt.replace(tzinfo=timezone.utc)
              except (TypeError, ValueError):
                  pass
              # Atom / ISO-8601: "2026-06-15T14:30:00Z"
              try:
                  dt = datetime.fromisoformat(value.replace("Z", "+00:00"))
                  return dt if dt.tzinfo else dt.replace(tzinfo=timezone.utc)
              except ValueError:
                  return None


          def _text(el):
              return el.text if el is not None and el.text else ""


          def parse_feed(xml_bytes, source):
              """Return a list of story dicts from RSS-2.0 or Atom XML bytes."""
              stories = []
              root = ET.fromstring(xml_bytes)
              tag = root.tag.lower()

              # RSS 2.0: <rss><channel><item>...
              items = root.findall(".//item")
              if items:
                  for it in items:
                      link = _text(it.find("link"))
                      stories.append({
                          "source": source,
                          "title": clean(_text(it.find("title"))),
                          "link": link.strip(),
                          "summary": clean(_text(it.find("description"))),
                          "date": parse_date(_text(it.find("pubDate"))),
                      })
                  return stories

              # Atom: <feed><entry>... (namespaced)
              ns = {"a": "http://www.w3.org/2005/Atom"}
              entries = root.findall(".//a:entry", ns) or root.findall(".//{*}entry")
              for en in entries:
                  link_el = en.find("a:link", ns)
                  if link_el is None:
                      link_el = en.find("{*}link")
                  link = link_el.get("href") if link_el is not None else ""
                  summary_el = en.find("a:summary", ns)
                  if summary_el is None:
                      summary_el = en.find("a:content", ns) or en.find("{*}summary") or en.find("{*}content")
                  date_raw = _text(en.find("a:published", ns)) or _text(en.find("a:updated", ns)) \
                      or _text(en.find("{*}published")) or _text(en.find("{*}updated"))
                  title_el = en.find("a:title", ns)
                  if title_el is None:
                      title_el = en.find("{*}title")
                  stories.append({
                      "source": source,
                      "title": clean(_text(title_el)),
                      "link": (link or "").strip(),
                      "summary": clean(_text(summary_el)),
                      "date": parse_date(date_raw),
                  })
              return stories


          def fetch(url):
              req = urllib.request.Request(url, headers={"User-Agent": UA})
              with urllib.request.urlopen(req, timeout=HTTP_TIMEOUT) as resp:
                  return resp.read()


          def collect_stories():
              cutoff = datetime.now(timezone.utc) - timedelta(days=WINDOW_DAYS)
              seen = set()
              stories = []
              for source, url in FEEDS:
                  try:
                      raw = fetch(url)
                      parsed = parse_feed(raw, source)
                  except Exception as exc:  # one bad feed must never sink the run
                      print(f"  ! skipped {source}: {exc}", file=sys.stderr)
                      continue
                  kept = 0
                  for s in parsed:
                      if not s["title"] or not s["link"]:
                          continue
                      # keep undated items, drop ones older than the window
                      if s["date"] is not None and s["date"] < cutoff:
                          continue
                      key = s["link"].split("?")[0].lower()
                      if key in seen:
                          continue
                      seen.add(key)
                      stories.append(s)
                      kept += 1
                  print(f"  + {source}: {kept} stories", file=sys.stderr)
              return stories


          def categorize(story):
              blob = (story["title"] + " " + story["summary"]).lower()
              for name, keywords in CATEGORIES:
                  if any(kw in blob for kw in keywords):
                      return name
              return FALLBACK_CATEGORY


          def score(story):
              blob = (story["title"] + " " + story["summary"]).lower()
              hits = sum(blob.count(kw) for _, kws in CATEGORIES for kw in kws)
              recency = 0
              if story["date"] is not None:
                  age_days = (datetime.now(timezone.utc) - story["date"]).days
                  recency = max(0, WINDOW_DAYS - age_days)
              return hits * 10 + recency


          def first_sentence(text, limit=160):
              if not text:
                  return ""
              m = re.split(r"(?<=[.!?])\s", text, maxsplit=1)
              s = m[0] if m else text
              return (s[: limit - 1] + "…") if len(s) > limit else s


          def build_html(grouped, top3, week_of, generated_at):
              def esc(t):
                  return html.escape(t or "")

              css = """
                  * { margin: 0; padding: 0; box-sizing: border-box; }
                  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
                      background: #fafafa; color: #1a1a1a; line-height: 1.6; padding: 2rem;
                      max-width: 900px; margin: 0 auto; }
                  header { border-bottom: 4px solid #f5c518; padding-bottom: 1.5rem; margin-bottom: 2rem; }
                  header h1 { font-size: 2rem; letter-spacing: -0.5px; }
                  header h1 span { color: #f5c518; }
                  .date { color: #666; font-size: 0.95rem; margin-top: 0.25rem; }
                  .top-watch { background: linear-gradient(135deg, #fffef5, #fff9db);
                      border: 2px solid #f5c518; border-radius: 12px; padding: 1.5rem; margin-bottom: 2.5rem; }
                  .top-watch h2 { font-size: 1.3rem; margin-bottom: 1rem; color: #b8860b; }
                  .top-watch ol { margin: 0 0 0 1.2rem; }
                  .top-watch li { margin-bottom: 0.6rem; }
                  .top-watch a { color: #1a1a1a; text-decoration: none; font-weight: 600; }
                  .top-watch a:hover { text-decoration: underline; }
                  h2.cat { font-size: 1.2rem; margin: 2rem 0 1rem; padding-bottom: 0.4rem;
                      border-bottom: 2px solid #eee; color: #b8860b; }
                  .card { background: #fff; border: 1px solid #eee; border-radius: 10px;
                      padding: 1rem 1.2rem; margin-bottom: 0.8rem; }
                  .card a.headline { color: #1a1a1a; text-decoration: none; font-weight: 600; font-size: 1.05rem; }
                  .card a.headline:hover { color: #b8860b; }
                  .meta { color: #888; font-size: 0.82rem; margin: 0.2rem 0 0.4rem; }
                  .summary { color: #444; font-size: 0.92rem; }
                  footer { margin-top: 3rem; padding-top: 1.5rem; border-top: 1px solid #eee;
                      color: #999; font-size: 0.8rem; }
              """.strip()

              parts = [
                  "<!DOCTYPE html>", '<html lang="en">', "<head>",
                  '<meta charset="UTF-8">',
                  '<meta name="viewport" content="width=device-width, initial-scale=1.0">',
                  "<title>Beyond the Yellow — Healthcare Intelligence</title>",
                  f"<style>{css}</style>", "</head>", "<body>",
                  "<header>",
                  '<h1>Beyond the <span>Yellow</span> — Healthcare Intelligence</h1>',
                  f'<div class="date">Week of {esc(week_of)}</div>',
                  "</header>",
              ]

              if top3:
                  parts.append('<div class="top-watch"><h2>⭐ Top 3 Things to Watch</h2><ol>')
                  for s in top3:
                      parts.append(
                          f'<li><a href="{esc(s["link"])}">{esc(s["title"])}</a> '
                          f'<span style="color:#888;font-weight:400;font-size:0.85rem;">({esc(s["source"])})</span></li>'
                      )
                  parts.append("</ol></div>")

              for cat, items in grouped:
                  if not items:
                      continue
                  parts.append(f'<h2 class="cat">{esc(cat)}</h2>')
                  for s in items:
                      datestr = s["date"].strftime("%b %d") if s["date"] else "Recent"
                      parts.append(
                          '<div class="card">'
                          f'<a class="headline" href="{esc(s["link"])}">{esc(s["title"])}</a>'
                          f'<div class="meta">{esc(s["source"])} · {datestr}</div>'
                          + (f'<div class="summary">{esc(first_sentence(s["summary"]))}</div>' if s["summary"] else "")
                          + "</div>"
                      )

              parts.append(
                  f'<footer>Auto-generated from public healthcare news feeds on {esc(generated_at)}. '
                  "Beyond the Yellow · Zocdoc.</footer>"
              )
              parts.append("</body></html>")
              return "\n".join(parts)


          def build(stories):
              now = datetime.now(timezone.utc)
              week_of = now.strftime("%B %d, %Y")
              generated_at = now.strftime("%b %d, %Y %H:%M UTC")

              # group
              buckets = {name: [] for name, _ in CATEGORIES}
              buckets[FALLBACK_CATEGORY] = []
              for s in stories:
                  buckets[categorize(s)].append(s)
              for name in buckets:
                  buckets[name].sort(key=lambda s: (s["date"] or now), reverse=True)
                  buckets[name] = buckets[name][:MAX_PER_CATEGORY]
              order = [name for name, _ in CATEGORIES] + [FALLBACK_CATEGORY]
              grouped = [(name, buckets[name]) for name in order]

              top3 = sorted(stories, key=score, reverse=True)[:3]

              html_doc = build_html(grouped, top3, week_of, generated_at)

              with open("index.html", "w", encoding="utf-8") as f:
                  f.write(html_doc)
              archive = f"healthcare-news-{now.strftime('%Y-%m-%d')}.html"
              with open(archive, "w", encoding="utf-8") as f:
                  f.write(html_doc)

              with open("top3.txt", "w", encoding="utf-8") as f:
                  if top3:
                      for i, s in enumerate(top3, 1):
                          f.write(f"{i}. {s['title']} ({s['source']})\n")
                  else:
                      f.write("Your weekly healthcare intelligence roundup is ready.\n")

              total = sum(len(items) for _, items in grouped)
              print(f"Wrote index.html, {archive}, top3.txt — {total} stories.", file=sys.stderr)
              return total


          SAMPLE = [
              {"source": "Fierce Healthcare", "title": "CMS finalizes new telehealth payment rules for 2027",
               "link": "https://example.com/cms-telehealth", "summary": "The agency expanded coverage for virtual visits. Providers welcomed the change.",
               "date": datetime.now(timezone.utc) - timedelta(days=1)},
              {"source": "MedCity News", "title": "Hims & Hers raises $200M to expand AI-driven care",
               "link": "https://example.com/hims-raise", "summary": "The direct-to-consumer company will invest in artificial intelligence tools.",
               "date": datetime.now(timezone.utc) - timedelta(days=2)},
              {"source": "STAT News", "title": "Major health system merger reshapes the Midwest",
               "link": "https://example.com/merger", "summary": "Two hospital networks announced an acquisition affecting 30 facilities.",
               "date": datetime.now(timezone.utc) - timedelta(days=3)},
              {"source": "Healthcare Dive", "title": "Survey: patients want easier online booking",
               "link": "https://example.com/booking", "summary": "Patient acquisition increasingly happens through digital marketplace channels.",
               "date": datetime.now(timezone.utc) - timedelta(days=4)},
          ]


          def main():
              if "--selftest" in sys.argv:
                  n = build(SAMPLE)
                  print(f"selftest OK: built page with {n} stories")
                  return
              print("Fetching healthcare news feeds…", file=sys.stderr)
              stories = collect_stories()
              if not stories:
                  print("WARNING: no stories fetched; writing a minimal page.", file=sys.stderr)
              build(stories)


          if __name__ == "__main__":
              main()
          PY

      - name: Commit and publish the page
        if: steps.guard.outputs.run == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Update healthcare intelligence report - $(TZ=America/New_York date +%Y-%m-%d)"
            git push
          fi

      - name: Post to Slack
        if: steps.guard.outputs.run == 'true'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          python3 - <<'PY'
          import datetime, json, os, urllib.request
          url = os.environ["SLACK_WEBHOOK_URL"]
          pages = "https://melissamorgenstern.github.io/beyond-the-yellow/"
          week = datetime.datetime.now().strftime("%B %d, %Y")
          try:
              top3 = open("top3.txt", encoding="utf-8").read().strip()
          except FileNotFoundError:
              top3 = "Your weekly healthcare intelligence roundup is ready."
          msg = f":newspaper: *Beyond the Yellow — Week of {week}*\n\n{top3}\n\n:link: *Full report:* {pages}"
          data = json.dumps({"message": msg}).encode()
          req = urllib.request.Request(url, data=data, headers={"Content-Type": "application/json"})
          print(urllib.request.urlopen(req).read().decode())
          PY

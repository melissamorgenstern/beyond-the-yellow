          def main():
              if "--selftest" in sys.argv:
                  n = build(SAMPLE)
                  print(f"selftest OK: built page with {n} stories")
                  return
              print("Fetching healthcare news feeds…", file=sys.stderr)
              stories = collect_stories()
              if not stories:
                  print("WARNING: no stories fetched; writing a minimal page.", file=sys.stderr)
              build(stories)


          if __name__ == "__main__":
              main()
